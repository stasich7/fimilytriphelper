services:
  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: family-trip-helper-app
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      APP_ADDR: :80
      APP_STATIC_DIR: /app/web
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "127.0.0.1:18080:80"

  postgres:
    image: postgres:16-alpine
    container_name: family-trip-helper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: family-trip-helper-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:19000:9000"
    volumes:
      - storage_data:/data

  storage-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: family-trip-helper-storage-init
    depends_on:
      - storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://storage:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do sleep 1; done;
      mc mb --ignore-existing local/\"$${MINIO_BUCKET}\";
      mc anonymous set download local/\"$${MINIO_BUCKET}\";
      "

volumes:
  postgres_data:
  storage_data:

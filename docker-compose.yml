services:
  postgres:
    image: postgres:16-alpine
    container_name: family-trip-helper-postgres
    environment:
      POSTGRES_DB: family_trip_helper
      POSTGRES_USER: family_trip_helper
      POSTGRES_PASSWORD: family_trip_helper
    volumes:
      - postgres_data:/var/lib/postgresql/data

  storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: family-trip-helper-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-family_trip_helper}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-family_trip_helper_storage}
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    volumes:
      - storage_data:/data

  storage-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: family-trip-helper-storage-init
    depends_on:
      - storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-family_trip_helper}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-family_trip_helper_storage}
      MINIO_BUCKET: ${MINIO_BUCKET:-family-trip-assets}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://storage:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do sleep 1; done;
      mc mb --ignore-existing local/\"$${MINIO_BUCKET}\";
      mc anonymous set download local/\"$${MINIO_BUCKET}\";
      "

  backend:
    build:
      context: /Users/user/repos/my/FamilyTripHelper
      dockerfile: backend/Dockerfile
    container_name: family-trip-helper-backend
    depends_on:
      - postgres
    environment:
      APP_ADDR: :80
      APP_STATIC_DIR: /app/web
      DB_DSN: postgres://family_trip_helper:family_trip_helper@postgres:5432/family_trip_helper?sslmode=disable
    ports:
      - "80:80"

volumes:
  postgres_data:
  storage_data:
